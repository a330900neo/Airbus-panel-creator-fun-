<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Cockpit Panel Editor</title>
    <style>
        /* --- FONT --- */
        @font-face {
            font-family: 'OpenBus';
            src: url('https://cdn.jsdelivr.net/gh/flybywiresim/aircraft@master/fbw-a32nx/src/fonts/OpenBus.ttf') format('truetype');
        }

        /* --- USER PROVIDED COCKPIT CSS --- */
        .panel-canvas { color: #FFF; font-family: 'OpenBus', Arial, sans-serif; font-size: 14pt; }
        .pushButton { display: flex; align-items: center; justify-content: center; border: none; background: transparent; text-align: center; position: relative; }
        .pushButton>.label { text-align: center; font-size: 0.7em; margin: 0; padding: 0.2em; white-space: nowrap; }
        
        /* Vertical Label Support */
        .label-vertical { writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 0.1em; }

        .pb { display: inline-block; background: linear-gradient(328deg, rgba(42,42,42,1) 0%, rgba(47,47,47,1) 83%); border: 0.2em solid #222; width: 4.5em; height: 4.5em; cursor: pointer; font-size: 0.7em; border-radius: 0.3em; text-align: center; color: #222; font-weight: normal; }
        .pb:hover { background: linear-gradient(328deg, rgba(57,57,57,1) 0%, rgba(62,62,62,1) 83%); }
        .pb>span { display: inline-block; margin-top: 0.55em; box-sizing: border-box; transition: color 0.1s, text-shadow 0.1s, border-color 0.1s; }
        .pb .main { border: 0.15em solid #222; border-radius: 0.1em; padding: 0.2em 0.2em 0.1em 0.2em; width: 80%; }
        
        /* Independent Logic-Driven Active States */
        .pb .main.logic-active { color: #FFF; border-color: #FFF; text-shadow: 0 0 0.1em #FFF; }
        .pb .secondary.logic-active { color: #FFDF4F; text-shadow: 0 0 0.1em #FFDF4F; }
        .pb .secondary.logic-active.activeGreen { color: #2BEC24; text-shadow: 0 0 0.1em #2BEC24; }
        .pb .secondary.logic-active.activeWhite { color: #FFF; text-shadow: 0 0 0.1em #FFF; }
        .pb .main.logic-active.activeBlue { color: #54BEFF; border-color: #54BEFF; text-shadow: 0 0 0.1em #54BEFF; }
        .pb .main.logic-active.activeRed { color: #E01223; border-color: #E01223; text-shadow: 0 0 0.1em #E01223; }
        .pb .main.logic-active.activeAmber { color: #FFDF4F; border-color: #FFDF4F; text-shadow: 0 0 0.1em #FFDF4F; }
        .pb .main.logic-active.activeGreen { color: #2BEC24; border-color: #2BEC24; text-shadow: 0 0 0.1em #2BEC24; }

        /* --- EDITOR UI CSS --- */
        body { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: sans-serif; user-select: none; touch-action: none; }
        * { box-sizing: border-box; }
        
        #editor-ui { display: flex; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; }
        .ui-panel { background: rgba(32, 44, 59, 0.95); border: 1px solid #444; color: white; padding: 15px; pointer-events: auto; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); overflow-y: auto; max-height: 100vh; }
        #toolbar { width: 250px; border-right: 1px solid #555; }
        #properties { width: 300px; margin-left: auto; border-left: 1px solid #555; }
        
        .ui-panel h3 { margin: 0 0 5px 0; font-size: 14px; border-bottom: 1px solid #555; padding-bottom: 5px; color: #54BEFF;}
        .ui-panel label { font-size: 12px; display: flex; flex-direction: column; gap: 4px; }
        .ui-panel input[type="text"], .ui-panel input[type="number"], .ui-panel select, .ui-panel textarea { background: #111; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; font-family: inherit; }
        .ui-panel button { background: #3B4C61; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .ui-panel button:hover { background: #54BEFF; color: black; }
        .ui-panel textarea { resize: vertical; min-height: 80px; font-family: monospace; }
        
        .row { display: flex; gap: 5px; align-items: center; }
        .row > * { flex: 1; }

        /* --- CANVAS & PAN/ZOOM --- */
        #viewport { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; cursor: grab; background-color: #A7B7CA; touch-action: none; }
        #viewport:active { cursor: grabbing; }
        #canvas-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; width: 0; height: 0; }
        
        .grid-layer { position: absolute; top: -5000px; left: -5000px; width: 10000px; height: 10000px; pointer-events: none; background-size: 50px 50px; background-image: linear-gradient(to right, rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.1) 1px, transparent 1px); display: none; }
        
        .panel-element { position: absolute; transform: translate(-50%, -50%); cursor: grab; }
        .panel-element.selected { outline: 2px dashed #54BEFF; outline-offset: 4px; z-index: 100; }
        .panel-line { position: absolute; background: white; transform-origin: left center; cursor: pointer; }
        .panel-line.selected { outline: 2px dashed #54BEFF; }

        body.play-mode #viewport { cursor: default; }
        body.play-mode .panel-element { cursor: pointer; }
        body.play-mode .ui-panel { display: none; }
        
        /* Play Mode Overlays */
        #hide-ui-btn { position: absolute; bottom: 20px; right: 20px; z-index: 2000; padding: 10px 20px; background: #E01223; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #hide-ui-btn:hover { background: #ff1a2f; }

        #exit-play-btn { display: none; position: absolute; top: 20px; left: 20px; z-index: 2000; padding: 10px 15px; background: #3B4C61; color: white; border: 2px solid #54BEFF; border-radius: 5px; cursor: pointer; font-weight: bold; pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #exit-play-btn:hover { background: #54BEFF; color: black; }
        body.play-mode #exit-play-btn { display: block; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="canvas-container" class="panel-canvas">
        <div id="grid" class="grid-layer"></div>
        <div id="elements-layer"></div>
    </div>
</div>

<button id="hide-ui-btn" onclick="toggleUI()">Hide UI (ESC)</button>
<button id="exit-play-btn" onclick="setMode('edit')">&#8592; Back to Edit Mode</button>

<div id="editor-ui">
    <div class="ui-panel" id="toolbar">
        <h3>System</h3>
        <label>Mode:
            <select id="appMode" onchange="setMode(this.value)">
                <option value="edit">Edit Mode</option>
                <option value="play">Play Mode</option>
            </select>
        </label>
        
        <h3>Global Variables</h3>
        <label>Dynamic code evaluated every tick.<br>Variables below can use variables above!<br>
            <textarea id="globalVars" oninput="parseVariables()" placeholder="VOLTS=28&#10;PWR_AVAIL = VOLTS > 10 | B1">PWR_AVAIL=1</textarea>
        </label>

        <h3>Panel Settings</h3>
        <label>Background Color:
            <input type="color" id="bgColor" value="#A7B7CA" onchange="updateBgColor(this.value)">
        </label>
        
        <div class="row">
            <label>Grid px: <input type="number" id="gridSize" value="50" onchange="updateGrid()"></label>
            <label style="flex-direction: row;">Show: <input type="checkbox" id="showGrid" onchange="updateGrid()"></label>
        </div>
        <label style="flex-direction: row;"><input type="checkbox" id="snapGrid" checked> Snap to Grid</label>
        
        <h3>Add Elements</h3>
        <button onclick="addButton()">+ Add Button</button>
        <button onclick="addLine()">+ Add Line</button>
        
        <h3>File</h3>
        <button onclick="exportLayout()">Export Panel</button>
        <button onclick="document.getElementById('importFile').click()">Import Panel</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importLayout(event)">
        <button onclick="resetView()">Reset Pan/Zoom</button>
    </div>

    <div class="ui-panel" id="properties" style="display: none;">
        <h3>Properties</h3>
        <div id="prop-shared">
            <button onclick="deleteSelected()" style="background: #E01223; margin-bottom: 10px; width: 100%;">Delete Selected</button>
        </div>
        
        <div id="prop-button" style="display: none; flex-direction: column; gap: 8px;">
            <div class="row">
                <label>Name (ID): <input type="text" id="p_name" oninput="updateProp('name', this.value)"></label>
                <label>Default State: <select id="p_defaultActive" onchange="updateProp('defaultActive', this.value === 'true')">
                    <option value="false">False (Off)</option>
                    <option value="true">True (On)</option>
                </select></label>
            </div>
            
            <label>Label Text: <input type="text" id="p_label" oninput="updateProp('label', this.value)"></label>
            <label>Label Position:
                <select id="p_labelPos" onchange="updateProp('labelPos', this.value)">
                    <option value="top">Top</option>
                    <option value="bottom">Bottom</option>
                    <option value="left">Left (Vertical)</option>
                    <option value="right">Right (Vertical)</option>
                </select>
            </label>
            
            <hr style="border-color:#444; width:100%;">
            <label>Main Text (Bottom): <input type="text" id="p_mainText" oninput="updateProp('mainText', this.value)"></label>
            <label>Main Color:
                <select id="p_mainColor" onchange="updateProp('mainColor', this.value)">
                    <option value="activeBlue">Blue</option><option value="activeWhite">White</option>
                    <option value="activeGreen">Green</option><option value="activeAmber">Amber</option><option value="activeRed">Red</option>
                </select>
            </label>
            <label>Main Logic Code (leave blank for default):
                <input type="text" id="p_mainLogic" placeholder="e.g. (B1@>5) & PWR_AVAIL" oninput="updateProp('mainLogic', this.value)">
            </label>

            <hr style="border-color:#444; width:100%;">
            <label>Secondary Text (Top): <input type="text" id="p_secText" oninput="updateProp('secText', this.value)"></label>
            <label>Secondary Color:
                <select id="p_secColor" onchange="updateProp('secColor', this.value)">
                    <option value="activeAmber">Amber (Fault)</option><option value="activeRed">Red</option>
                    <option value="activeWhite">White</option><option value="activeGreen">Green</option><option value="activeBlue">Blue</option>
                </select>
            </label>
            <label>Secondary Logic Code (leave blank for default):
                <input type="text" id="p_secLogic" placeholder="e.g. !B1 | V1>10" oninput="updateProp('secLogic', this.value)">
            </label>
        </div>

        <div id="prop-line" style="display: none; flex-direction: column; gap: 10px;">
            <div class="row">
                <label>Width: <input type="number" id="p_lineWidth" oninput="updateProp('width', parseInt(this.value))"></label>
                <label>Height: <input type="number" id="p_lineHeight" oninput="updateProp('height', parseInt(this.value))"></label>
            </div>
            <label>Color: <input type="color" id="p_lineColor" oninput="updateProp('color', this.value)"></label>
        </div>
    </div>
</div>

<script>
    // --- STATE MANAGEMENT ---
    let state = {
        elements: [],
        globalExpressions: [],
        selectedId: null,
        mode: 'edit', 
        uiVisible: true,
        pan: { x: 0, y: 0 },
        zoom: 1
    };

    let logicInterval = null;
    let elementCounter = 1;

    const viewport = document.getElementById('viewport');
    const container = document.getElementById('canvas-container');
    const elementsLayer = document.getElementById('elements-layer');

    // Parse Variables from UI into expression blocks
    function parseVariables() {
        const text = document.getElementById('globalVars').value;
        state.globalExpressions = [];
        text.split('\n').forEach(line => {
            const parts = line.split('=');
            if (parts.length >= 2) {
                const key = parts[0].trim();
                const expr = parts.slice(1).join('=').trim();
                if (key) state.globalExpressions.push({ key, expr });
            }
        });
    }

    // --- RENDERER ---
    function render() {
        elementsLayer.innerHTML = '';
        state.elements.forEach(el => {
            if (el.type === 'button') renderButton(el);
            if (el.type === 'line') renderLine(el);
        });
        updateSelectionUI();
    }

    function renderButton(data) {
        const wrapper = document.createElement('div');
        wrapper.className = `panel-element ${state.selectedId === data.id ? 'selected' : ''}`;
        wrapper.id = data.id;
        wrapper.style.left = `${data.x}px`;
        wrapper.style.top = `${data.y}px`;

        const btn = document.createElement('div');
        btn.className = `pushButton`;
        
        let labelClass = "label";
        if (data.labelPos === 'top') btn.style.flexDirection = 'column';
        if (data.labelPos === 'bottom') btn.style.flexDirection = 'column-reverse';
        if (data.labelPos === 'left') { btn.style.flexDirection = 'row'; labelClass += ' label-vertical'; }
        if (data.labelPos === 'right') { btn.style.flexDirection = 'row-reverse'; labelClass += ' label-vertical'; }

        // Logic display states
        const mActive = data.mainActive ? 'logic-active' : '';
        const sActive = data.secActive ? 'logic-active' : '';

        btn.innerHTML = `
            <div class="${labelClass}">${data.label}</div>
            <div class="pb">
                <span class="secondary ${data.secColor} ${sActive}">${data.secText}</span>
                <span class="main ${data.mainColor} ${mActive}">${data.mainText}</span>
            </div>
        `;
        wrapper.appendChild(btn);
        elementsLayer.appendChild(wrapper);
    }

    function renderLine(data) {
        const line = document.createElement('div');
        line.className = `panel-line ${state.selectedId === data.id ? 'selected' : ''}`;
        line.id = data.id;
        line.style.left = `${data.x}px`;
        line.style.top = `${data.y}px`;
        line.style.width = `${data.width}px`;
        line.style.height = `${data.height}px`;
        line.style.backgroundColor = data.color;
        elementsLayer.appendChild(line);
    }

    // --- LOGIC ENGINE ---
    function startLogicEngine() {
        const now = Date.now();
        state.elements.forEach(el => {
            if (el.type === 'button') {
                el.active = el.defaultActive;
                el.lastToggle = now;
                el.mainActive = el.defaultActive;
                el.secActive = el.defaultActive;
            }
        });
        parseVariables();
        logicInterval = setInterval(processLogic, 50); // 20Hz
    }

    function stopLogicEngine() {
        if (logicInterval) clearInterval(logicInterval);
        state.elements.forEach(el => {
            if (el.type === 'button') {
                el.mainActive = true; 
                el.secActive = true;
            }
        });
    }

    function processLogic() {
        const now = Date.now();
        const env = {};

        // 1. Build Environment Context from Buttons
        state.elements.forEach(el => {
            if (el.type !== 'button') return;
            env[el.name] = el.active;
            env[`${el.name}_main`] = el.mainActive;
            env[`${el.name}_sec`] = el.secActive;
            
            const durationSec = (now - el.lastToggle) / 1000;
            env[`${el.name}_at`] = el.active ? durationSec : 0;
            env[`${el.name}_hash`] = !el.active ? durationSec : 0;
        });

        // 2. Evaluate Global Variables dynamically
        state.globalExpressions.forEach(g => {
            const num = parseFloat(g.expr);
            // If it's purely a number string, set directly. Otherwise, evaluate as logic.
            if (!isNaN(num) && num.toString() === g.expr) {
                env[g.key] = num;
            } else {
                env[g.key] = evaluateExpression(g.expr, env);
            }
        });

        // 3. Evaluate Button Logic Strings
        let needsRender = false;
        state.elements.forEach(el => {
            if (el.type !== 'button') return;

            let newMain = el.active;
            if (el.mainLogic && el.mainLogic.trim() !== "") {
                newMain = !!evaluateExpression(el.mainLogic, env); // cast to boolean for display
            }

            let newSec = el.active;
            if (el.secLogic && el.secLogic.trim() !== "") {
                newSec = !!evaluateExpression(el.secLogic, env); // cast to boolean for display
            }

            if (newMain !== el.mainActive || newSec !== el.secActive) {
                el.mainActive = newMain;
                el.secActive = newSec;
                needsRender = true;
                
                const domEl = document.getElementById(el.id);
                if (domEl) {
                    const mSpan = domEl.querySelector('.main');
                    const sSpan = domEl.querySelector('.secondary');
                    if (mSpan) mSpan.classList.toggle('logic-active', newMain);
                    if (sSpan) sSpan.classList.toggle('logic-active', newSec);
                }
            }
        });
    }

    function evaluateExpression(expr, env) {
        try {
            // Replace custom operators
            let jsExpr = expr.replace(/&/g, '&&').replace(/\|/g, '||');
            
            // Map custom suffixes (B1@ -> B1_at, B1$ -> B1_main, B1% -> B1_sec, B1# -> B1_hash)
            jsExpr = jsExpr.replace(/([a-zA-Z0-9_]+)@/g, '$1_at');
            jsExpr = jsExpr.replace(/([a-zA-Z0-9_]+)#/g, '$1_hash');
            jsExpr = jsExpr.replace(/([a-zA-Z0-9_]+)\$/g, '$1_main');
            jsExpr = jsExpr.replace(/([a-zA-Z0-9_]+)%/g, '$1_sec');

            const keys = Object.keys(env);
            const vals = Object.values(env);
            
            // Note: Returning the actual value, not strictly a boolean, so math works!
            const func = new Function(...keys, `return (${jsExpr});`);
            return func(...vals);
        } catch (e) {
            return false; // Silently fail bad logic
        }
    }

    // --- ELEMENT CREATION ---
    function generateId() { return 'el_' + Math.random().toString(36).substr(2, 9); }
    function getNextName() { return 'B' + (elementCounter++); }

    function addButton() {
        const centerX = (-state.pan.x + viewport.clientWidth / 2) / state.zoom;
        const centerY = (-state.pan.y + viewport.clientHeight / 2) / state.zoom;
        
        state.elements.push({
            id: generateId(), type: 'button', name: getNextName(),
            x: Math.round(centerX), y: Math.round(centerY),
            label: 'BTN', labelPos: 'top',
            defaultActive: false, active: false, lastToggle: Date.now(),
            mainText: 'ON', mainColor: 'activeBlue', mainLogic: '', mainActive: true,
            secText: 'FAULT', secColor: 'activeAmber', secLogic: '', secActive: true
        });
        render();
    }

    function addLine() {
        const centerX = (-state.pan.x + viewport.clientWidth / 2) / state.zoom;
        const centerY = (-state.pan.y + viewport.clientHeight / 2) / state.zoom;
        state.elements.push({
            id: generateId(), type: 'line', x: Math.round(centerX), y: Math.round(centerY),
            width: 150, height: 4, color: '#FFFFFF'
        });
        render();
    }

    function deleteSelected() {
        if (!state.selectedId) return;
        state.elements = state.elements.filter(e => e.id !== state.selectedId);
        state.selectedId = null;
        render();
    }

    // --- INTERACTION & DRAGGING (Unified Touch/Mouse) ---
    let isDragging = false;
    let dragTarget = null;
    let isPanning = false;
    let startPan = { x: 0, y: 0 };

    function getEventPos(e) {
        if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        return { x: e.clientX, y: e.clientY };
    }

    function handleInputStart(e) {
        // Only left click for mouse
        if (e.type === 'mousedown' && e.button !== 0) return; 
        
        const pos = getEventPos(e);
        const targetEl = e.target.closest('.panel-element, .panel-line');

        if (state.mode === 'play') {
            if (targetEl && targetEl.classList.contains('panel-element')) {
                const elData = state.elements.find(el => el.id === targetEl.id);
                if (elData && elData.type === 'button') {
                    elData.active = !elData.active;
                    elData.lastToggle = Date.now();
                }
            } else {
                isPanning = true;
                startPan = { x: pos.x - state.pan.x, y: pos.y - state.pan.y };
            }
            return;
        }

        if (targetEl) {
            state.selectedId = targetEl.id;
            isDragging = true;
            dragTarget = state.elements.find(el => el.id === state.selectedId);
            render();
        } else {
            state.selectedId = null;
            isPanning = true;
            startPan = { x: pos.x - state.pan.x, y: pos.y - state.pan.y };
            render();
        }
    }

    function handleInputMove(e) {
        const pos = getEventPos(e);
        if (isPanning) {
            state.pan.x = pos.x - startPan.x;
            state.pan.y = pos.y - startPan.y;
            updateTransform();
        } else if (isDragging && dragTarget && state.mode === 'edit') {
            const rect = viewport.getBoundingClientRect();
            let rawX = (pos.x - rect.left - state.pan.x) / state.zoom;
            let rawY = (pos.y - rect.top - state.pan.y) / state.zoom;

            if (document.getElementById('snapGrid').checked) {
                const gs = parseInt(document.getElementById('gridSize').value);
                rawX = Math.round(rawX / gs) * gs;
                rawY = Math.round(rawY / gs) * gs;
            }

            dragTarget.x = rawX;
            dragTarget.y = rawY;
            
            const domEl = document.getElementById(dragTarget.id);
            if (domEl) {
                domEl.style.left = `${dragTarget.x}px`;
                domEl.style.top = `${dragTarget.y}px`;
            }
        }
    }

    function handleInputEnd() {
        isDragging = false;
        isPanning = false;
        dragTarget = null;
    }

    // Bind Mouse Events
    viewport.addEventListener('mousedown', handleInputStart);
    window.addEventListener('mousemove', handleInputMove);
    window.addEventListener('mouseup', handleInputEnd);

    // Bind Touch Events
    viewport.addEventListener('touchstart', (e) => { 
        if(e.target.closest('.ui-panel') || e.target.id === 'hide-ui-btn' || e.target.id === 'exit-play-btn') return; 
        handleInputStart(e); 
    }, {passive: false});
    window.addEventListener('touchmove', (e) => { 
        if(isDragging || isPanning) e.preventDefault(); 
        handleInputMove(e); 
    }, {passive: false});
    window.addEventListener('touchend', handleInputEnd);

    // --- PAN / ZOOM ---
    viewport.addEventListener('wheel', (e) => {
        if(e.target.closest('.ui-panel')) return; 
        e.preventDefault();
        const zoomDelta = e.deltaY > 0 ? 0.9 : 1.1;
        const newZoom = Math.max(0.1, Math.min(state.zoom * zoomDelta, 5));
        
        const rect = viewport.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        state.pan.x = mouseX - (mouseX - state.pan.x) * (newZoom / state.zoom);
        state.pan.y = mouseY - (mouseY - state.pan.y) * (newZoom / state.zoom);
        state.zoom = newZoom;
        updateTransform();
    }, { passive: false });

    function updateTransform() {
        container.style.transform = `translate(${state.pan.x}px, ${state.pan.y}px) scale(${state.zoom})`;
    }

    function resetView() {
        state.pan = { x: 0, y: 0 }; state.zoom = 1;
        updateTransform();
    }

    // --- UI CONTROLS & PROPERTIES ---
    function updateGrid() {
        const gs = document.getElementById('gridSize').value;
        const gridEl = document.getElementById('grid');
        gridEl.style.backgroundSize = `${gs}px ${gs}px`;
        gridEl.style.display = document.getElementById('showGrid').checked ? 'block' : 'none';
    }

    function updateBgColor(val) { viewport.style.backgroundColor = val; }

    function setMode(mode) {
        state.mode = mode;
        document.body.className = mode + '-mode';
        document.getElementById('appMode').value = mode; // Sync the dropdown just in case
        
        if (mode === 'play') {
            state.selectedId = null;
            startLogicEngine();
            render();
        } else {
            stopLogicEngine();
            render();
        }
    }

    function toggleUI() {
        state.uiVisible = !state.uiVisible;
        const uiElements = document.querySelectorAll('.ui-panel');
        uiElements.forEach(el => el.style.visibility = state.uiVisible ? 'visible' : 'hidden');
        document.getElementById('hide-ui-btn').innerText = state.uiVisible ? 'Hide UI (ESC)' : 'Show UI (ESC)';
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') toggleUI();
        if ((e.key === 'Delete' || e.key === 'Backspace') && state.mode === 'edit' && state.selectedId && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
            deleteSelected();
        }
    });

    function updateSelectionUI() {
        const propsPanel = document.getElementById('properties');
        if (!state.selectedId || state.mode === 'play') {
            propsPanel.style.display = 'none'; return;
        }

        const el = state.elements.find(e => e.id === state.selectedId);
        if (!el) return;

        propsPanel.style.display = 'flex';
        document.getElementById('prop-button').style.display = el.type === 'button' ? 'flex' : 'none';
        document.getElementById('prop-line').style.display = el.type === 'line' ? 'flex' : 'none';

        if (el.type === 'button') {
            document.getElementById('p_name').value = el.name;
            document.getElementById('p_defaultActive').value = el.defaultActive ? "true" : "false";
            document.getElementById('p_label').value = el.label;
            document.getElementById('p_labelPos').value = el.labelPos;
            document.getElementById('p_mainText').value = el.mainText;
            document.getElementById('p_mainColor').value = el.mainColor;
            document.getElementById('p_mainLogic').value = el.mainLogic || "";
            document.getElementById('p_secText').value = el.secText;
            document.getElementById('p_secColor').value = el.secColor;
            document.getElementById('p_secLogic').value = el.secLogic || "";
        } else {
            document.getElementById('p_lineWidth').value = el.width;
            document.getElementById('p_lineHeight').value = el.height;
            document.getElementById('p_lineColor').value = el.color;
        }
    }

    function updateProp(key, value) {
        if (!state.selectedId) return;
        const el = state.elements.find(e => e.id === state.selectedId);
        if (el) { el[key] = value; render(); }
    }

    // --- EXPORT & IMPORT ---
    function exportLayout() {
        const layoutData = {
            bgColor: document.getElementById('bgColor').value,
            globalVars: document.getElementById('globalVars').value,
            elements: state.elements
        };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(layoutData, null, 2));
        const dlNode = document.createElement('a');
        dlNode.setAttribute("href", dataStr); dlNode.setAttribute("download", "panel_layout.json");
        document.body.appendChild(dlNode); dlNode.click(); dlNode.remove();
    }

    function importLayout(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.elements) {
                    state.elements = data.elements;
                    if (data.bgColor) { document.getElementById('bgColor').value = data.bgColor; updateBgColor(data.bgColor); }
                    if (data.globalVars !== undefined) { document.getElementById('globalVars').value = data.globalVars; parseVariables(); }
                    
                    // Reset counter to avoid name overlap
                    let maxNum = 0;
                    state.elements.forEach(el => {
                        if(el.name && el.name.startsWith('B')) {
                            let n = parseInt(el.name.substring(1));
                            if(!isNaN(n) && n > maxNum) maxNum = n;
                        }
                    });
                    elementCounter = maxNum + 1;

                    state.selectedId = null;
                    resetView(); render();
                }
            } catch (err) { alert("Invalid layout file."); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    // Init
    updateGrid(); updateTransform(); stopLogicEngine(); parseVariables();
</script>
</body>
</html>
